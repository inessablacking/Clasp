<style>

margin:0;
padding:0;
box-sizing:border-box;

body{

color:#4a0000;
}

header{
background:#8b0000;
color:white;
padding:30px;

font-weight:bold;
letter-spacing:2px;
}

.container{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.products{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:20px;
}

.product{
background:white;
border-radius:12px;
overflow:hidden;
text-decoration:none;
color:inherit;
transition:0.3s;
box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.product:hover{
transform:translateY(-5px);
}

.product img{
width:100%;
height:300px;
object-fit:cover;
display:block;
}

.price{
padding:15px;
text-align:center;
font-size:22px;
font-weight:bold;
color:#8b0000;
}

footer{
margin-top:50px;
padding:20px;
text-align:center;
background:#8b0000;
color:white;
}
</style>

</head>

<header>
