<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Сумки Инессы</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

:root{
--beige:#f7f2ea;
--red:#7b1820;
--text:#2b2b2b;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:var(--beige);
color:var(--text);
font-family:'Inter',sans-serif;
}

.hero{
padding:100px 30px 80px;
text-align:center;
}

.hero h1{
font-family:'Cormorant Garamond',serif;
font-size:72px;
font-weight:500;
letter-spacing:1px;
color:var(--red);
}

.hero p{
margin-top:18px;
font-size:15px;
letter-spacing:2px;
text-transform:uppercase;
opacity:.7;
}

.collection{
max-width:1300px;
margin:auto;
padding:0 25px 80px;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:28px;
}

.card{
text-decoration:none;
color:inherit;
display:block;
}

.card-image{
overflow:hidden;
background:white;
}

.card-image img{
width:100%;
aspect-ratio:4/5;
object-fit:cover;
display:block;
transition:.7s;
}

.card:hover img{
transform:scale(1.03);
}

.card-info{
padding-top:14px;
display:flex;
justify-content:space-between;
align-items:center;
}

.card-name{
font-size:14px;
letter-spacing:1px;
text-transform:uppercase;
}

.card-price{
color:var(--red);
font-weight:500;
}

footer{
border-top:1px solid rgba(0,0,0,.08);
padding:35px;
text-align:center;
font-size:12px;
letter-spacing:1px;
opacity:.6;
}

@media(max-width:700px){

.hero{
padding:70px 20px 50px;
}

.hero h1{
font-size:52px;
}

.grid{
gap:18px;
}

.card-name{
font-size:12px;
}

}

</style>
</head>
